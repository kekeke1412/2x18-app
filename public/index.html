<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <!-- PWA viewport – prevents tap zoom on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA / App meta ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="2X18" />
    <link rel="apple-touch-icon" href="/icon-192.jpg" />
    <!-- MS Tiles -->
    <meta name="msapplication-TileColor" content="#121212" />
    <meta name="msapplication-TileImage" content="/icon-192.jpg" />

    <!-- ── SEO ── -->
    <meta name="description" content="Ứng dụng quản lý nhóm 2X18 – APP" />
    <meta name="robots" content="noindex" />

    <link rel="icon" type="image/svg+xml" href="/icon-192.jpg" />
    <title>2X18 – APP</title>

    <!-- ── Base font size bump (+1px → 17px) for better readability ── -->
    <style>
      html { font-size: 17px; }
      /* safe-area padding for notch phones */
      body { padding-top: env(safe-area-inset-top); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then(reg => console.log('[SW] registered', reg.scope))
            .catch(err => console.warn('[SW] failed', err));
        });

        // Handle navigation messages from SW (notification click)
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data?.type === 'NAVIGATE' && event.data.url) {
            // Use React Router history via custom event
            window.dispatchEvent(new CustomEvent('sw-navigate', { detail: event.data.url }));
          }
        });
      }
    </script>
  </body>
</html>
